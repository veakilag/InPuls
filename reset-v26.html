<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#090c11">
  <title>InPuls — обновление v29</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#090c11; color:#dbe8ee; }
    main { width:min(560px,calc(100% - 32px)); padding:28px; border:1px solid #24434f; border-radius:16px; background:#0d1218; }
    h1 { margin:0 0 12px; font-size:22px; }
    p { color:#8fa6b2; line-height:1.5; }
    strong { color:#45e0ad; }
    button { width:100%; padding:13px; border:0; border-radius:10px; background:#45d8ab; color:#04110d; font-weight:800; cursor:pointer; }
    button:disabled { opacity:.55; cursor:wait; }
    small { display:block; min-height:20px; margin-top:14px; color:#7f95a0; }
  </style>
</head>
<body>
  <main>
    <h1>Обновление InPuls v29</h1>
    <p>Будет исправлено подключение общего рынка и зависание после возврата из фоновой вкладки.</p>
    <button id="reset" type="button">Обновить InPuls до v29</button>
    <small id="status"></small>
  </main>
  <script>
    const button = document.getElementById("reset");
    const status = document.getElementById("status");
    button.addEventListener("click", async () => {
      button.disabled = true;
      try {
        status.textContent = "Удаляю старые Service Worker…";
        const registrations = "serviceWorker" in navigator
          ? await navigator.serviceWorker.getRegistrations()
          : [];
        await Promise.all(registrations.map((registration) => registration.unregister()));

        status.textContent = "Удаляю старые кеши…";
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        status.textContent = "Подключаю стабильную сборку v29…";
        if ("serviceWorker" in navigator) {
          const registration = await navigator.serviceWorker.register(
            "./sw.js?v=29",
            { scope: "./", updateViaCache: "none" },
          );
          await registration.update();
          await Promise.race([
            new Promise((resolve) => {
              if (navigator.serviceWorker.controller) resolve();
              else navigator.serviceWorker.addEventListener("controllerchange", resolve, { once: true });
            }),
            new Promise((resolve) => setTimeout(resolve, 3000)),
          ]);
        }

        status.textContent = "Готово. Открываю InPuls…";
        location.replace(`./?build=29&t=${Date.now()}`);
      } catch (error) {
        status.textContent = `Ошибка обновления: ${error?.message || error}`;
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
