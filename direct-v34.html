<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#090c11">
  <title>InPuls — внешнее ядро v34</title>
  <style>
    :root { color-scheme:dark; font-family:Inter,system-ui,sans-serif; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#090c11; color:#dbe8ee; }
    main { width:min(620px,calc(100% - 32px)); padding:28px; border:1px solid #24434f; border-radius:16px; background:#0d1218; }
    h1 { margin:0 0 12px; font-size:22px; }
    p { color:#8fa6b2; line-height:1.5; }
    strong { color:#45e0ad; }
    pre { max-height:45vh; overflow:auto; white-space:pre-wrap; color:#ffb8c0; }
  </style>
</head>
<body>
  <main>
    <h1>Запускаю InPuls v34</h1>
    <p id="status">Загружаю интерфейс напрямую, через внешнее ядро без перехвата…</p>
    <pre id="error"></pre>
  </main>
  <script>
    const status = document.querySelector("#status");
    const errorBox = document.querySelector("#error");

    (async () => {
      try {
        // На всякий случай ещё раз удаляем регистрации. Эта страница больше
        // не зависит от них и продолжит работать после удаления.
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        status.textContent = "Получаю основной интерфейс…";
        const response = await fetch(`./index.html?source=v34&t=${Date.now()}`, {
          cache: "no-store",
        });
        if (!response.ok) throw new Error(`index.html: HTTP ${response.status}`);

        let html = await response.text();
        const oldScript = '<script type="module" src="./app.js?v=23"></' + 'script>';
        const newScript = '<script type="module" src="./app-v34.js?v=34"></' + 'script>';

        if (!html.includes(oldScript)) {
          throw new Error("В index.html не найден старый тег app.js?v=23");
        }

        html = html.replace(oldScript, newScript);
        html = html.replace(
          '<meta name="inpuls-build" content="23" />',
          '<meta name="inpuls-build" content="34" />',
        );
        html = html.replace(
          'SCREENER <small>v23</small>',
          'SCREENER <small>v34</small>',
        );

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error("InPuls v34 shell failed:", error);
        status.textContent = "Ошибка прямого запуска";
        errorBox.textContent = error?.stack || error?.message || String(error);
      }
    })();
  </script>
</body>
</html>
