<!doctype html>
<html lang="ru">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>InPuls v31 — запуск</title>
<style>:root{color-scheme:dark;font-family:Inter,system-ui,sans-serif}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#090c11;color:#dbe8ee}main{padding:28px;border:1px solid #24434f;border-radius:16px;background:#0d1218;text-align:center}p{color:#8fa6b2}</style></head>
<body><main><strong>Запускаю InPuls v31…</strong><p id="status">Проверяю управление Service Worker.</p></main>
<script>
(async () => {
  const status = document.getElementById('status');
  if (!('serviceWorker' in navigator)) {
    location.replace(`./?build=31&t=${Date.now()}`);
    return;
  }
  await navigator.serviceWorker.ready;
  if (!navigator.serviceWorker.controller) {
    status.textContent = 'Передаю управление новой сборке…';
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload(), { once: true });
    setTimeout(() => location.reload(), 1200);
    return;
  }
  status.textContent = 'Готово. Открываю сайт…';
  location.replace(`./?build=31&t=${Date.now()}`);
})();
</script></body></html>
